<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 260px; margin: 0; padding: 10px; background: #0a0a0a; color: #e8e6e3;
           font: 12px/1.4 -apple-system, system-ui, sans-serif; }
    input, button { width: 100%; box-sizing: border-box; margin: 3px 0; padding: 5px;
           background: #111; color: #e8e6e3; border: 1px solid #333; border-radius: 2px; font: inherit; }
    button { cursor: pointer; }
    .row { display: flex; justify-content: space-between; gap: 4px; padding: 4px 0; border-bottom: 1px solid #222; }
    .row button { width: auto; margin: 0; }
    .muted { color: #6e6e6e; }
  </style>
</head>
<body>
  <div class="muted">paste a vault unlock token (from the secrets app), then fill the current site.</div>
  <input id="tok" type="password" placeholder="X-Vault-Token">
  <button id="go">find logins for this site</button>
  <div id="out"></div>
  <script src="popup.js"></script>
</body>
</html>
